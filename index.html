<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>联机斗地主 - 稳定版</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: system-ui, "Microsoft YaHei", "Segoe UI", Roboto, sans-serif;
        }
        body {
            background: linear-gradient(145deg, #1e6b2c 0%, #0e4a1a 100%);
            color: #fff;
            padding: 15px;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .container {
            max-width: 600px;
            width: 100%;
            margin: 0 auto;
        }
        .panel {
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(2px);
            border-radius: 24px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.2);
        }
        h1 {
            text-align: center;
            margin-bottom: 20px;
            font-size: 1.8rem;
            letter-spacing: 2px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }
        .form-item {
            margin: 15px 0;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            flex-wrap: wrap;
        }
        label {
            font-weight: bold;
            font-size: 1rem;
        }
        input, select {
            padding: 10px 14px;
            border-radius: 40px;
            border: none;
            outline: none;
            font-size: 1rem;
            background: #f5f5f5;
            color: #222;
            width: 160px;
            text-align: center;
        }
        .btn-group {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin: 20px 0 10px;
            flex-wrap: wrap;
        }
        button {
            padding: 10px 20px;
            border: none;
            border-radius: 40px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            background: #ffc107;
            color: #2c2c2c;
            transition: all 0.2s ease;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }
        button:active {
            transform: scale(0.96);
        }
        button:disabled {
            background: #6c757d;
            color: #ccc;
            cursor: not-allowed;
            transform: none;
        }
        .status {
            text-align: center;
            margin-top: 15px;
            font-size: 0.9rem;
            background: rgba(0,0,0,0.5);
            padding: 6px 12px;
            border-radius: 40px;
            display: inline-block;
            width: auto;
            margin-left: auto;
            margin-right: auto;
        }

        /* 游戏界面 */
        .game-header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 8px;
            font-weight: bold;
            background: rgba(0,0,0,0.3);
            padding: 8px 12px;
            border-radius: 40px;
        }
        .player-area {
            margin: 12px 0;
            background: rgba(0,0,0,0.2);
            border-radius: 16px;
            padding: 8px;
        }
        .player-info {
            font-size: 0.9rem;
            margin-bottom: 6px;
            display: flex;
            justify-content: space-between;
        }
        .card-back {
            display: flex;
            gap: 2px;
            font-size: 1.2rem;
            letter-spacing: 2px;
        }
        .card-back::before {
            content: "🂠";
            margin-right: 2px;
        }

        .table-area {
            background: rgba(0,0,0,0.3);
            border-radius: 20px;
            padding: 12px;
            margin: 15px 0;
        }
        .base-cards, .last-played {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin: 8px 0;
            min-height: 50px;
            align-items: center;
        }
        .hand-area {
            margin-top: 20px;
        }
        .my-info {
            font-weight: bold;
            margin-bottom: 12px;
            font-size: 1rem;
            background: rgba(0,0,0,0.3);
            padding: 6px 12px;
            border-radius: 30px;
            display: inline-block;
        }
        .cards-container {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            justify-content: center;
            margin-bottom: 15px;
            background: rgba(0,0,0,0.2);
            border-radius: 20px;
            padding: 10px;
            min-height: 110px;
        }
        .card {
            width: 44px;
            height: 64px;
            border-radius: 8px;
            background: white;
            color: #222;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            font-weight: bold;
            border: 1px solid #aaa;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
            cursor: pointer;
            transition: 0.1s linear;
        }
        .card.red {
            color: #e33;
        }
        .card.selected {
            background: #ffd966;
            transform: translateY(-8px);
            box-shadow: 0 6px 12px rgba(0,0,0,0.2);
        }
        #landlordMark {
            color: #ffd966;
            font-weight: bold;
            margin-left: 8px;
        }
        .tip-text {
            font-size: 0.8rem;
            color: #ddd;
            text-align: center;
            margin-top: 10px;
        }
        @media (max-width: 500px) {
            .card {
                width: 38px;
                height: 56px;
                font-size: 1rem;
            }
            .btn-group button {
                padding: 8px 16px;
                font-size: 0.9rem;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <!-- 房间界面 -->
    <div id="roomDiv" class="panel">
        <h1>🎮 联机斗地主</h1>
        <div class="form-item">
            <label>🔢 房间号：</label>
            <input type="text" id="roomId" placeholder="输入房间号" value="666666" maxlength="10" pattern="[0-9a-zA-Z]+">
        </div>
        <div class="form-item">
            <label>🎲 游戏模式：</label>
            <select id="modeSelect">
                <option value="3p">👥 3人联机</option>
                <option value="2p1ai">🤖 2真人+1AI</option>
                <option value="1p2ai">🤖 1真人+2AI</option>
            </select>
        </div>
        <div class="btn-group">
            <button onclick="createRoom()">✨ 创建房间</button>
            <button onclick="joinRoom()">🚪 加入房间</button>
        </div>
        <div style="text-align:center;">
            <div id="roomStatus" class="status">⚡ 等待连接服务器...</div>
        </div>
        <div class="tip-text">💡 确保服务器已启动，并使用 ZeroTier 同一网络</div>
    </div>

    <!-- 游戏主界面 -->
    <div id="gameDiv" class="panel" style="display:none">
        <div class="game-header">
            <div>🏠 房间：<span id="displayRoomId"></span></div>
            <div id="turnIndicator">🎴 等待开始...</div>
        </div>

        <div class="player-area">
            <div class="player-info" id="player2Info">👤 玩家2: <span>0</span>张</div>
            <div class="card-back" id="player2Cards"></div>
        </div>
        <div class="player-area">
            <div class="player-info" id="player3Info">👤 玩家3: <span>0</span>张</div>
            <div class="card-back" id="player3Cards"></div>
        </div>

        <div class="table-area">
            <div style="font-size:0.85rem;">📦 底牌：</div>
            <div class="base-cards" id="baseCards"></div>
            <div style="font-size:0.85rem;">🃟 上一手：</div>
            <div class="last-played" id="lastPlayedArea"></div>
        </div>

        <div class="hand-area">
            <div class="my-info" id="myInfo">🃏 我: <span>0</span>张 <span id="landlordMark"></span></div>
            <div class="cards-container" id="myCards"></div>
            <div class="btn-group">
                <button id="playBtn" onclick="playSelected()" disabled>🎯 出牌</button>
                <button id="passBtn" onclick="pass()" disabled>⏭️ 过</button>
                <button id="callLordBtn" onclick="callLord(1)" style="background:#ffaa33; color:#000; display:none;">🔥 叫地主</button>
                <button id="noLordBtn" onclick="callLord(0)" style="background:#cc6666; color:#fff; display:none;">❌ 不叫</button>
            </div>
        </div>
    </div>
</div>

<script src="game.js"></script>
</body>
</html>
