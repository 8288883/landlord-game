<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>斗地主 - 本地对局</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: system-ui, "Microsoft YaHei", "Segoe UI", Roboto, sans-serif;
            user-select: none;
        }
        body {
            background: linear-gradient(145deg, #1e6b2c 0%, #0e4a1a 100%);
            color: #fff;
            padding: 15px;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .container {
            max-width: 700px;
            width: 100%;
            margin: 0 auto;
        }
        .game-panel {
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(2px);
            border-radius: 24px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.2);
        }
        .game-header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 8px;
            font-weight: bold;
            background: rgba(0,0,0,0.3);
            padding: 8px 12px;
            border-radius: 40px;
        }
        .player-area {
            margin: 12px 0;
            background: rgba(0,0,0,0.2);
            border-radius: 16px;
            padding: 8px;
            position: relative;
        }
        .player-info {
            font-size: 0.9rem;
            margin-bottom: 6px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .card-back {
            display: flex;
            gap: 2px;
            font-size: 1.2rem;
            letter-spacing: 2px;
        }
        .table-area {
            background: rgba(0,0,0,0.3);
            border-radius: 20px;
            padding: 12px;
            margin: 15px 0;
        }
        .base-cards, .last-played {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            margin: 8px 0;
            min-height: 50px;
            align-items: center;
        }
        .hand-area {
            margin-top: 20px;
        }
        .my-info {
            font-weight: bold;
            margin-bottom: 12px;
            font-size: 1rem;
            background: rgba(0,0,0,0.3);
            padding: 6px 12px;
            border-radius: 30px;
            display: inline-block;
        }
        .cards-container {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            justify-content: center;
            margin-bottom: 15px;
            background: rgba(0,0,0,0.2);
            border-radius: 20px;
            padding: 10px;
            min-height: 110px;
        }
        .card {
            width: 44px;
            height: 64px;
            border-radius: 8px;
            background: white;
            color: #222;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2rem;
            font-weight: bold;
            border: 1px solid #aaa;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
            cursor: pointer;
            transition: 0.1s linear;
        }
        .card.red {
            color: #e33;
        }
        .card.selected {
            background: #ffd966;
            transform: translateY(-8px);
            box-shadow: 0 6px 12px rgba(0,0,0,0.2);
        }
        #landlordMark {
            color: #ffd966;
            font-weight: bold;
            margin-left: 8px;
        }
        .btn-group {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin: 20px 0;
            flex-wrap: wrap;
        }
        button {
            padding: 10px 20px;
            border: none;
            border-radius: 40px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }
        button:active {
            transform: scale(0.96);
        }
        button:disabled {
            background: #6c757d;
            color: #ccc;
            cursor: not-allowed;
            transform: none;
        }
        .btn-primary {
            background: #ffc107;
            color: #2c2c2c;
        }
        .btn-danger {
            background: #dc3545;
            color: white;
        }
        .btn-success {
            background: #28a745;
            color: white;
        }
        .btn-sm {
            padding: 4px 12px;
            font-size: 0.8rem;
        }
        .empty-seat {
            color: #ffaa66;
            font-style: italic;
        }
        .status {
            text-align: center;
            margin-top: 15px;
            font-size: 0.9rem;
            background: rgba(0,0,0,0.5);
            padding: 8px 16px;
            border-radius: 40px;
            display: inline-block;
            width: auto;
        }
        .tip-text {
            font-size: 0.8rem;
            color: #ddd;
            text-align: center;
            margin-top: 10px;
        }
        @media (max-width: 500px) {
            .card {
                width: 38px;
                height: 56px;
                font-size: 1rem;
            }
            .btn-group button {
                padding: 8px 16px;
                font-size: 0.9rem;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="game-panel" id="gameDiv">
        <div class="game-header">
            <div>🎴 斗地主</div>
            <div id="turnIndicator">等待游戏开始...</div>
        </div>

        <!-- 玩家2座位 -->
        <div class="player-area" id="player2Area">
            <div class="player-info">
                <span id="player2Name">玩家2</span>
                <span id="player2CardsCount">0张</span>
                <button id="player2HostBtn" class="btn-sm" onclick="fillAI(1)">🤖 托管</button>
            </div>
            <div class="card-back" id="player2Cards"></div>
        </div>

        <!-- 玩家3座位 -->
        <div class="player-area" id="player3Area">
            <div class="player-info">
                <span id="player3Name">玩家3</span>
                <span id="player3CardsCount">0张</span>
                <button id="player3HostBtn" class="btn-sm" onclick="fillAI(2)">🤖 托管</button>
            </div>
            <div class="card-back" id="player3Cards"></div>
        </div>

        <div class="table-area">
            <div style="font-size:0.85rem;">📦 底牌：</div>
            <div class="base-cards" id="baseCards"></div>
            <div style="font-size:0.85rem;">🃟 上一手：</div>
            <div class="last-played" id="lastPlayedArea"></div>
        </div>

        <div class="hand-area">
            <div class="my-info" id="myInfo">🃏 我: <span>0</span>张 <span id="landlordMark"></span></div>
            <div class="cards-container" id="myCards"></div>
            <div class="btn-group">
                <button id="playBtn" onclick="playSelected()" disabled>🎯 出牌</button>
                <button id="passBtn" onclick="pass()" disabled>⏭️ 过</button>
                <button id="callLordBtn" onclick="callLord(1)" style="background:#ffaa33; color:#000; display:none;">🔥 叫地主</button>
                <button id="noLordBtn" onclick="callLord(0)" style="background:#cc6666; color:#fff; display:none;">❌ 不叫</button>
            </div>
        </div>
    </div>
</div>

<script src="game.js"></script>
</body>
</html>
