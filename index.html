<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>联机斗地主 - 完整正式版</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">
    <!-- 房间界面 -->
    <div id="roomDiv" class="panel">
        <h1>🎮 联机斗地主</h1>
        <div class="form-item">
            <label>房间号：</label>
            <input type="number" id="roomId" placeholder="例如 123456" value="666666">
        </div>
        <div class="form-item">
            <label>游戏模式：</label>
            <select id="modeSelect">
                <option value="3p">3人联机</option>
                <option value="2p1ai">2真人+1AI</option>
                <option value="1p2ai">1真人+2AI</option>
            </select>
        </div>
        <div class="btn-group">
            <button onclick="createRoom()">创建房间</button>
            <button onclick="joinRoom()">加入房间</button>
        </div>
        <div id="roomStatus" class="status">等待连接...</div>
    </div>

    <!-- 游戏主界面 -->
    <div id="gameDiv" class="panel" style="display:none">
        <div class="game-header">
            <div>房间：<span id="displayRoomId"></span></div>
            <div id="turnIndicator">等待开始...</div>
        </div>

        <!-- 其他玩家牌区 -->
        <div class="player-area">
            <div class="player-info" id="player2Info">玩家2: <span>0</span>张</div>
            <div class="card-back" id="player2Cards"></div>
        </div>
        <div class="player-area">
            <div class="player-info" id="player3Info">玩家3: <span>0</span>张</div>
            <div class="card-back" id="player3Cards"></div>
        </div>

        <!-- 桌面牌区 -->
        <div class="table-area">
            <div class="base-cards" id="baseCards"></div>
            <div class="last-played" id="lastPlayedArea"></div>
        </div>

        <!-- 自己的牌区 -->
        <div class="hand-area">
            <div class="my-info" id="myInfo">我: <span>0</span>张 <span id="landlordMark"></span></div>
            <div class="cards-container" id="myCards"></div>
            <div class="btn-group">
                <button id="playBtn" onclick="playSelected()" disabled>出牌</button>
                <button id="passBtn" onclick="pass()" disabled>过</button>
                <button id="callLordBtn" onclick="callLord(1)" style="background:#ff6">叫地主</button>
                <button id="noLordBtn" onclick="callLord(0)" style="background:#f99">不叫</button>
            </div>
        </div>
    </div>
</div>

<script src="game.js"></script>
</body>
</html>
